services:
  tribunal:
    build:
      context: .
      dockerfile: Dockerfile
    image: authorship-tribunal:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_CONVEX_URL: ${NUXT_PUBLIC_CONVEX_URL:?Set NUXT_PUBLIC_CONVEX_URL in .env}
      NUXT_PUBLIC_APP_BASE_URL: ${NUXT_PUBLIC_APP_BASE_URL:?Set NUXT_PUBLIC_APP_BASE_URL in .env}
      NUXT_ALLOWED_ORIGINS: ${NUXT_ALLOWED_ORIGINS:-}
      CONVEX_SERVER_SECRET: ${CONVEX_SERVER_SECRET:?Set CONVEX_SERVER_SECRET in .env}
    ports:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
